<!DOCTYPE html>
<html lang="ar">
<head>
    <title>Mining Empire - Eternal Version</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, shrink-to-fit=no, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- استدعاء ملفاتك من المستودع مباشرة باستخدام الأسماء الظاهرة في الصورة -->
    <link rel="stylesheet" type="text/css" href="game.css?v=1776229083">
    <script type="text/javascript" src="game.js?v=1776229083"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0c0d14; }
        #ajaxbar, #game, #canvas { width: 100% !important; height: 100% !important; position: absolute !important; top: 0; left: 0; }
        #orientate, #MobileAdInGamePreroll, #MobileAdInGameEnd, .adsbygoogle { display: none !important; }
    </style>
</head>
<body>
    <div id="ajaxbar">
        <div id="game"><canvas id="canvas"></canvas></div>
        <div id="play" class="play"></div>
    </div>

    <script>
        // تسجيل الـ Service Worker لجعلها تعمل بدون إنترنت
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        window.onload = function() {
            if(document.getElementById('play')) { document.getElementById('play').style.display = 'none'; }
        };
    </script>
</body>
</html>
